      neutral|no_shock|inflation_stable|policy_tightening: -0.15
      neutral|no_shock|inflation_rising|policy_easing: 0.00
      neutral|no_shock|inflation_rising|policy_stable: -0.15
      neutral|no_shock|inflation_rising|policy_tightening: -0.30
      neutral|bearish_shock|inflation_falling|policy_easing: 0.05
