      unfavorable|no_shock|inflation_falling|policy_easing: -0.15
      unfavorable|no_shock|inflation_falling|policy_stable: -0.30
      unfavorable|no_shock|inflation_falling|policy_tightening: -0.45
      unfavorable|no_shock|inflation_stable|policy_easing: -0.30
      unfavorable|no_shock|inflation_stable|policy_stable: -0.45
      unfavorable|no_shock|inflation_stable|policy_tightening: -0.60
      unfavorable|no_shock|inflation_rising|policy_easing: -0.45
      unfavorable|no_shock|inflation_rising|policy_stable: -0.60
      unfavorable|no_shock|inflation_rising|policy_tightening: -0.75
      unfavorable|bearish_shock|inflation_falling|policy_easing: -0.40
      unfavorable|bearish_shock|inflation_falling|policy_stable: -0.55
      unfavorable|bearish_shock|inflation_falling|policy_tightening: -0.70
      unfavorable|bearish_shock|inflation_stable|policy_easing: -0.55
      unfavorable|bearish_shock|inflation_stable|policy_stable: -0.70
      unfavorable|bearish_shock|inflation_stable|policy_tightening: -0.85
      unfavorable|bearish_shock|inflation_rising|policy_easing: -0.70
      unfavorable|bearish_shock|inflation_rising|policy_stable: -0.85
      unfavorable|bearish_shock|inflation_rising|policy_tightening: -1.00
    rule_mapped:
      function: rule_mapped_stance
      state_inputs:
        - name: duration_preference
          source_score: duration_preference_score
          classification: threshold_state
          raw_output: duration_preference_state_raw
          stabilized_output: duration_preference_state
          stabilization_changed_output: state_stabilization_changed_duration_preference
          state_buckets:
            positive: favorable
            neutral: neutral
            negative: unfavorable
        - name: duration_rate_shock
          source_score: duration_rate_shock_score
          classification: threshold_state
          raw_output: duration_rate_shock_state_raw
          stabilized_output: duration_rate_shock_state
          stabilization_changed_output: state_stabilization_changed_duration_rate_shock
          state_buckets:
            positive: bullish_shock
            neutral: no_shock
            negative: bearish_shock
        - name: inflation
          source_score: inflation_pressure_score
          classification: threshold_state
          raw_output: inflation_state_raw
          stabilized_output: inflation_state
          stabilization_changed_output: state_stabilization_changed_inflation
          state_buckets:
            positive: inflation_rising
            neutral: inflation_stable
            negative: inflation_falling
        - name: policy
          source_score: policy_stance_score
          classification: threshold_state
          raw_output: policy_state_raw
          stabilized_output: policy_state
          stabilization_changed_output: state_stabilization_changed_policy
          state_buckets:
            positive: policy_tightening
            neutral: policy_stable
            negative: policy_easing
      state_stabilization: *duration_rule_state_stabilization
      rule_case_output: duration_rule_case
      stabilization_changed_any_output: state_stabilization_changed_any
      rule_scores: *duration_rule_scores
      score_output: duration_rule_stance_score
      stance_output: duration_rule_stance
      strength_output: duration_rule_stance_strength
    inputs:
      - component: duration_preference_score
      - component: duration_rate_shock_score
      - component: inflation_pressure_score
      - component: policy_stance_score
    labels:
      direction:
        positive: duration_positive
        neutral: duration_neutral
        negative: duration_negative
      strength:
        weak: weak
        moderate: moderate
        strong: strong

  credit:
    description: "Macro stance toward credit exposure."
    score_output: credit_stance_score
    stance_output: credit_stance
    strength_output: credit_stance_strength
    function: credit_spread_stance
    state_buckets: &credit_rule_state_buckets
      credit_spread_change:
        positive: positive
        neutral: neutral
        negative: negative
      credit_spread_state:
        positive: wide
        neutral: normal
        negative: tight
    state_stabilization: &credit_rule_state_stabilization
      credit_spread_change:
        hysteresis_buffer: 0.0
        min_state_persistence: 1
      credit_spread_state:
        hysteresis_buffer: 0.0
        min_state_persistence: 1
    rule_scores: &credit_rule_scores
      positive|wide: 1.2
      positive|normal: 1.0
      positive|tight: 0.4
      neutral|wide: 0.2
      neutral|normal: 0.0
      neutral|tight: -0.2
      negative|wide: -0.8
      negative|normal: -1.0
      negative|tight: -1.2
    rule_adjustments: &credit_rule_adjustments
      default_cap:
        min: -1.5
        max: 1.5
      states:
        positive|wide:
          change_intensity_weight: 0.20
          level_intensity_weight: 0.10
        positive|normal:
          change_intensity_weight: 0.20
          level_intensity_weight: 0.0
        positive|tight:
          change_intensity_weight: 0.10
          level_intensity_weight: -0.20
          cap:
            max: 0.6
        neutral|wide:
          change_intensity_weight: 0.0
          level_intensity_weight: 0.10
          cap:
            max: 0.4
        neutral|normal:
          change_intensity_weight: 0.0
          level_intensity_weight: 0.0
        neutral|tight:
          change_intensity_weight: 0.0
          level_intensity_weight: -0.10
          cap:
            min: -0.4
        negative|wide:
          change_intensity_weight: -0.20
          level_intensity_weight: 0.05
        negative|normal:
          change_intensity_weight: -0.20
          level_intensity_weight: 0.0
        negative|tight:
          change_intensity_weight: -0.20
          level_intensity_weight: -0.10
    rule_mapped:
      function: rule_mapped_stance
      state_inputs:
        - name: credit_spread_change
          source_score: credit_spread_change_score
          classification: threshold_state
          raw_output: credit_spread_change_state_raw
          stabilized_output: credit_spread_change_state
          stabilization_changed_output: state_stabilization_changed_change_state
          state_buckets:
            positive: positive
            neutral: neutral
            negative: negative
        - name: credit_spread_state
          source_score: credit_spread_state_score
          classification: threshold_state
          raw_output: credit_spread_state_category_raw
          stabilized_output: credit_spread_state_category
          stabilization_changed_output: state_stabilization_changed_spread_state
          state_buckets:
            positive: wide
            neutral: normal
            negative: tight
      state_stabilization: *credit_rule_state_stabilization
      rule_case_output: credit_state_pair
      stabilization_changed_any_output: state_stabilization_changed_pair
      rule_scores: *credit_rule_scores
      base_rule_score_output: base_rule_score
      adjustment:
        metadata_outputs:
          - credit_spread_change_intensity
          - credit_spread_state_intensity
        adjustment_output: rule_adjustment
        config: *credit_rule_adjustments
      adjusted_score_output: credit_stance_score
      score_output: credit_stance_score
      stance_output: credit_stance
      strength_output: credit_stance_strength
    inputs:
      - component: credit_spread_change_score
      - component: credit_spread_state_score
    labels:
      direction:
        positive: credit_positive
        neutral: credit_neutral
        negative: credit_negative
      strength:
        weak: weak
        moderate: moderate
        strong: strong

  usd_exposure:
