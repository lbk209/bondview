      favorable|no_shock|inflation_falling|policy_stable: 0.60
      favorable|no_shock|inflation_falling|policy_tightening: 0.45
      favorable|no_shock|inflation_stable|policy_easing: 0.60
      favorable|no_shock|inflation_stable|policy_stable: 0.45
      favorable|no_shock|inflation_stable|policy_tightening: 0.30
      favorable|no_shock|inflation_rising|policy_easing: 0.45
      favorable|no_shock|inflation_rising|policy_stable: 0.30
      favorable|no_shock|inflation_rising|policy_tightening: 0.15
      favorable|bearish_shock|inflation_falling|policy_easing: 0.50
      favorable|bearish_shock|inflation_falling|policy_stable: 0.35
      favorable|bearish_shock|inflation_falling|policy_tightening: 0.20
      favorable|bearish_shock|inflation_stable|policy_easing: 0.35
      favorable|bearish_shock|inflation_stable|policy_stable: 0.20
      favorable|bearish_shock|inflation_stable|policy_tightening: 0.05
      favorable|bearish_shock|inflation_rising|policy_easing: 0.20
      favorable|bearish_shock|inflation_rising|policy_stable: 0.05
      favorable|bearish_shock|inflation_rising|policy_tightening: -0.10
      neutral|bullish_shock|inflation_falling|policy_easing: 0.55
      neutral|bullish_shock|inflation_falling|policy_stable: 0.40
      neutral|bullish_shock|inflation_falling|policy_tightening: 0.25
      neutral|bullish_shock|inflation_stable|policy_easing: 0.40
      neutral|bullish_shock|inflation_stable|policy_stable: 0.25
      neutral|bullish_shock|inflation_stable|policy_tightening: 0.10
      neutral|bullish_shock|inflation_rising|policy_easing: 0.25
      neutral|bullish_shock|inflation_rising|policy_stable: 0.10
      neutral|bullish_shock|inflation_rising|policy_tightening: -0.05
      neutral|no_shock|inflation_falling|policy_easing: 0.30
      neutral|no_shock|inflation_falling|policy_stable: 0.15
      neutral|no_shock|inflation_falling|policy_tightening: 0.00
      neutral|no_shock|inflation_stable|policy_easing: 0.15
