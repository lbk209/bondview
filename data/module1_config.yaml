      neutral|bearish_shock|inflation_rising|policy_easing: -0.25
      neutral|bearish_shock|inflation_rising|policy_stable: -0.40
      neutral|bearish_shock|inflation_rising|policy_tightening: -0.55
      unfavorable|bullish_shock|inflation_falling|policy_easing: 0.10
      unfavorable|bullish_shock|inflation_falling|policy_stable: -0.05
      unfavorable|bullish_shock|inflation_falling|policy_tightening: -0.20
      unfavorable|bullish_shock|inflation_stable|policy_easing: -0.05
      unfavorable|bullish_shock|inflation_stable|policy_stable: -0.20
