horizons:
  rates: 126
  ultra_long_rates: 126
  duration_rate_shock: 20
  curve: 126
  long_end_curve: 126
  credit: 63
  fx: 63
  normalization: 252
  normalization_monthly: 36
  score_smoothing: 30
  score_smoothing_monthly: 3
  daily_macro_input_smoothing: 30
  inflation_yoy: 12
  inflation_change: 3
  policy_realized: 6

model_metadata:
  target_groups:
    duration:
      component:
        - duration_preference
        - duration_rate_shock
      stance:
        - duration
    credit:
      component:
        - credit_spread_change
      stance:
        - credit
    curve:
      component:
        - curve_change
        - curve_state
        - curve_move_driver
      stance:
        - curve_positioning
    inflation:
      component:
        - inflation_pressure
      stance: []
    policy:
      component:
        - policy_stance
      stance: []
    fx:
      component:
        - fx_condition
      stance: []
  diagnostics: {}

features:
  # ------------------------------------------------------------
  # Rate / duration features
  # ------------------------------------------------------------

  dgs2_change:
    description: "Change in 2Y Treasury yield over the rates horizon."
    method: change
    input: dgs2
    horizon: rates
    frequency: daily

  dgs10_change:
    description: "Change in 10Y Treasury yield over the rates horizon."
    method: change
    input: dgs10
    horizon: rates
    frequency: daily

  dgs30_change:
    description: "Change in 30Y Treasury yield over the ultra-long rates horizon."
    method: change
    input: dgs30
    horizon: ultra_long_rates
    frequency: daily

  dgs10_change_short:
    description: "Change in 10Y Treasury yield over the duration rate shock horizon."
    method: change
    input: dgs10
    horizon: duration_rate_shock
    frequency: daily

  dgs30_change_short:
    description: "Change in 30Y Treasury yield over the duration rate shock horizon."
    method: change
    input: dgs30
    horizon: duration_rate_shock
    frequency: daily

  # ------------------------------------------------------------
  # Curve features
  # ------------------------------------------------------------

  curve_10y2y_level:
    description: "10Y minus 2Y Treasury yield spread."
    method: spread
    inputs:
      - dgs10
      - dgs2
    frequency: daily

  curve_10y2y_change:
    description: "Change in 10Y-2Y Treasury curve spread over the curve horizon."
    method: change
    input: curve_10y2y_level
    horizon: curve
    frequency: daily

  curve_30y10y_level:
    description: "30Y minus 10Y Treasury yield spread."
    method: spread
    inputs:
      - dgs30
      - dgs10
    frequency: daily

  curve_30y10y_change:
    description: "Change in 30Y-10Y Treasury curve spread over the long-end curve horizon."
    method: change
    input: curve_30y10y_level
    horizon: long_end_curve
    frequency: daily

  # ------------------------------------------------------------
  # Credit features
  # ------------------------------------------------------------

  baa10y_change:
    description: "Change in Moody's Baa spread over 10Y Treasury over the credit horizon."
    method: change
    input: baa10y
    horizon: credit
    frequency: daily

  baa10y_level:
    description: "Moody's Baa spread over 10Y Treasury level."
    method: level
    input: baa10y
    frequency: daily

  # ------------------------------------------------------------
  # Inflation features
  # ------------------------------------------------------------

  cpi_yoy:
    description: "Year-over-year percentage change in CPI."
    method: pct_change
    input: cpiaucsl
    horizon: inflation_yoy
    frequency: monthly

  cpi_yoy_change:
    description: "Change in CPI YoY inflation over the inflation-change horizon."
    method: change
    input: cpi_yoy
    horizon: inflation_change
    frequency: monthly

  # ------------------------------------------------------------
  # Policy features
  # ------------------------------------------------------------

  fedfunds_change:
    description: "Change in the effective federal funds rate over the realized-policy horizon."
    method: change
    input: fedfunds
    horizon: policy_realized
    frequency: monthly

  # ------------------------------------------------------------
  # FX features
  # ------------------------------------------------------------

  dexkous_change:
    description: "Change in USD/KRW over the FX horizon."
    method: change
    input: dexkous
    horizon: fx
    frequency: daily

  dexkous_pct_change:
    description: "Percentage change in USD/KRW over the FX horizon."
    method: pct_change
    input: dexkous
    horizon: fx
    frequency: daily

components:
  # ------------------------------------------------------------
  # Duration preference
  # ------------------------------------------------------------

  duration_preference:
    description: "Measures whether duration exposure is theoretically favored."
    score:
      output: duration_preference_score
      function: weighted_feature_score
      inputs:
        - feature: dgs10_change
          weight: -0.5
        - feature: dgs30_change
          weight: -0.5
      normalization: rolling_zscore
      smoothing: score_smoothing
      clip:
        min: -3.0
        max: 3.0
    label:
      mode: threshold
      output: duration_label
      source: duration_preference_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: duration_favorable
        neutral: duration_neutral
        negative: duration_unfavorable

  # ------------------------------------------------------------
  # Duration rate shock
  # ------------------------------------------------------------

  duration_rate_shock:
    description: "Detects abrupt short-horizon Treasury yield repricing relevant to duration exposure."
    score:
      output: duration_rate_shock_score
      function: weighted_feature_score
      inputs:
        - feature: dgs10_change_short
          weight: -0.5
        - feature: dgs30_change_short
          weight: -0.5
      normalization: rolling_zscore
      clip:
        min: -3.0
        max: 3.0
    label:
      mode: threshold
      output: duration_rate_shock_label
      source: duration_rate_shock_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: duration_bullish_shock
        neutral: duration_no_shock
        negative: duration_bearish_shock

  # ------------------------------------------------------------
  # Credit spread change
  # ------------------------------------------------------------

  credit_spread_change:
    description: "Measures whether credit spreads are tightening, stable, or widening."
    score:
      output: credit_spread_change_score
      function: single_feature_score
      input: baa10y_change
      sign: inverse
      input_preparation:
        smoothing: daily_macro_input_smoothing
      normalization: rolling_zscore
      normalization_horizon: normalization
      clip:
        min: -2.0
        max: 2.0
    diagnostics:
      prepared_inputs:
        enabled: true
    label:
      mode: threshold
      output: credit_spread_change_label
      source: credit_spread_change_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: credit_spread_tightening
        neutral: credit_spread_stable
        negative: credit_spread_widening

  # ------------------------------------------------------------
  # Credit spread state
  # ------------------------------------------------------------

  credit_spread_state:
    description: "Measures whether the current credit spread state is wide, normal, or tight."
    score:
      output: credit_spread_state_score
      function: single_feature_score
      input: baa10y_level
      state_transform: fixed_anchor
      anchors:
        negative: 1.5
        neutral: 2.5
        positive: 3.5
      sign: direct
      input_preparation:
        smoothing: daily_macro_input_smoothing
      clip:
        min: -2.0
        max: 2.0
    diagnostics:
      prepared_inputs:
        enabled: true
    label:
      mode: threshold
      output: credit_spread_state_label
      source: credit_spread_state_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: credit_spread_wide
        neutral: credit_spread_normal
        negative: credit_spread_tight

  # ------------------------------------------------------------
  # Inflation pressure
  # ------------------------------------------------------------

  inflation_pressure:
    description: "Measures whether inflation pressure is rising, stable, or falling."
    score:
      output: inflation_pressure_score
      function: single_feature_score
      input: cpi_yoy_change
      sign: direct
      normalization: rolling_zscore
      normalization_horizon: normalization_monthly
      smoothing: score_smoothing_monthly
      clip:
        min: -3.0
        max: 3.0
    label:
      mode: threshold
      output: inflation_label
      source: inflation_pressure_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: inflation_rising
        neutral: inflation_stable
        negative: inflation_falling

  # ------------------------------------------------------------
  # Policy stance
  # ------------------------------------------------------------

  policy_stance:
    description: "Measures whether realized policy stance is tightening, stable, or easing."
    score:
      output: policy_stance_score
      function: single_feature_score
      input: fedfunds_change
      sign: direct
      normalization: rolling_zscore
      normalization_horizon: normalization_monthly
      smoothing: score_smoothing_monthly
      clip:
        min: -3.0
        max: 3.0
    label:
      mode: threshold
      output: policy_label
      source: policy_stance_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: policy_tightening
        neutral: policy_stable
        negative: policy_easing

  # ------------------------------------------------------------
  # FX condition
  # ------------------------------------------------------------

  fx_condition:
    description: "Measures whether USD exposure is supported by USD/KRW movement."
    score:
      output: fx_score
      function: single_feature_score
      input: dexkous_pct_change
      sign: direct
      normalization: rolling_zscore
      smoothing: score_smoothing
      clip:
        min: -3.0
        max: 3.0
    label:
      mode: threshold
      output: fx_label
      source: fx_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: usd_exposure_favorable
        neutral: usd_exposure_neutral
        negative: usd_exposure_unfavorable

  # ------------------------------------------------------------
  # Curve change
  # ------------------------------------------------------------

  curve_change:
    description: "Measures whether the Treasury curve is steepening, stable, or flattening."
    score:
      output: curve_change_score
      function: weighted_feature_score
      inputs:
        - feature: curve_10y2y_change
          weight: 1.0
      input_preparation:
        smoothing: daily_macro_input_smoothing
      normalization: rolling_zscore
      clip:
        min: -3.0
        max: 3.0
      buckets:
        steepening:
          min: 0.5
        flattening:
          max: -0.5
        stable:
          default: true
    diagnostics:
      prepared_inputs:
        enabled: true
    label:
      mode: bucket
      output: curve_change_label
      source: curve_change_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: curve_steepening
        neutral: curve_stable
        negative: curve_flattening
      bucket_labels:
        steepening: positive
        stable: neutral
        flattening: negative

  # ------------------------------------------------------------
  # Curve state
  # ------------------------------------------------------------

  curve_state:
    description: "Measures whether the 10Y-2Y Treasury curve level is steep, normal, flat, or inverted."
    score:
      output: curve_state_score
      function: weighted_feature_score
      state_transform: fixed_anchor
      inputs:
        - feature: curve_10y2y_level
          anchors:
            negative: 0.0
            neutral: 0.5
            positive: 1.5
      input_preparation:
        smoothing: daily_macro_input_smoothing
      sign: direct
      clip:
        min: -3.0
        max: 3.0
      buckets:
        inverted:
          max: -1.0
        flat:
          min_exclusive: -1.0
          max_exclusive: 0.5
        normal:
          min: 0.5
          max_exclusive: 1.0
        steep:
          min: 1.0
    diagnostics:
      prepared_inputs:
        enabled: true
    label:
      mode: bucket
      output: curve_state_label
      source: curve_state_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: curve_normal
        neutral: curve_flat
        negative: curve_inverted
        inverted: curve_inverted
        flat: curve_flat
        normal: curve_normal
        steep: curve_steep
      bucket_labels:
        inverted: inverted
        flat: flat
        normal: normal
        steep: steep

  # ------------------------------------------------------------
  # Curve yield-move driver
  # ------------------------------------------------------------

  curve_move_driver:
    description: "Measures whether the 2Y and 10Y yield move direction is bull, bear, or mixed."
    score:
      output: curve_move_driver_score
      function: curve_move_driver_score
      inputs:
        - feature: dgs2_change
        - feature: dgs10_change
      input_preparation:
        smoothing: daily_macro_input_smoothing
        min_abs_value: 0.05
      clip:
        min: -1.0
        max: 1.0
      buckets:
        bull_parallel:
          score: 1.0
        bear_parallel:
          score: -1.0
        front_end_down_long_end_up:
          score: 0.5
        front_end_up_long_end_down:
          score: -0.5
        mixed_or_unclear:
          score: 0.0
          default: true
    diagnostics:
      prepared_inputs:
        enabled: true
        input_roles:
          dgs2_change: front_end
          dgs10_change: long_end
    label:
      mode: bucket
      output: curve_move_driver_label
      source: curve_move_driver_score
      thresholds:
        positive: 0.5
        negative: -0.5
      labels:
        positive: bull
        neutral: mixed_or_unclear
        negative: bear
      bucket_labels:
        bull_parallel: positive
        front_end_down_long_end_up: positive
        mixed_or_unclear: neutral
        bear_parallel: negative
        front_end_up_long_end_down: negative

stance_label_rules:
  direction_thresholds:
    positive_min: 0.5
    negative_max: -0.5

  strength_thresholds:
    weak_max_abs: 0.5
    moderate_max_abs: 1.0
    strong_min_abs: 1.0

  neutral_strength: weak

exposure_stances:
  duration:
    description: "Macro stance toward duration exposure."
    score_output: duration_rule_stance_score
    stance_output: duration_rule_stance
    strength_output: duration_rule_stance_strength
    function: duration_rule_stance
    rule_state_components:
      - duration_preference
      - duration_rate_shock
      - inflation
      - policy
    state_thresholds:
      positive: 0.25
      negative: -0.25
    state_buckets: &duration_rule_state_buckets
      duration_preference:
        positive: favorable
        neutral: neutral
        negative: unfavorable
      duration_rate_shock:
        positive: bullish_shock
        neutral: no_shock
        negative: bearish_shock
      inflation:
        positive: inflation_rising
        neutral: inflation_stable
        negative: inflation_falling
      policy:
        positive: policy_tightening
        neutral: policy_stable
        negative: policy_easing
    state_stabilization: &duration_rule_state_stabilization
      duration_preference:
        hysteresis_buffer: 0.05
        min_state_persistence: 2
      duration_rate_shock:
        hysteresis_buffer: 0.05
        min_state_persistence: 1
      inflation:
        hysteresis_buffer: 0.05
        min_state_persistence: 2
      policy:
        hysteresis_buffer: 0.05
        min_state_persistence: 2
    rule_scores: &duration_rule_scores
      favorable|bullish_shock|inflation_falling|policy_easing: 1.00
      favorable|bullish_shock|inflation_falling|policy_stable: 0.85
      favorable|bullish_shock|inflation_falling|policy_tightening: 0.70
      favorable|bullish_shock|inflation_stable|policy_easing: 0.85
      favorable|bullish_shock|inflation_stable|policy_stable: 0.70
      favorable|bullish_shock|inflation_stable|policy_tightening: 0.55
      favorable|bullish_shock|inflation_rising|policy_easing: 0.70
      favorable|bullish_shock|inflation_rising|policy_stable: 0.55
